<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación AR - Jungle Events</title>
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
<style>body,html{margin:0;padding:0;overflow:hidden;}#loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:sans-serif;}#footer{position:absolute;bottom:10px;width:100%;text-align:center;font-family:sans-serif;color:#fff;}</style>
</head>
<body>
<div id="loading">Cargando AR... apunta tu cámara a la invitación</div>
<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; trackerSize: 512;">
<a-marker type="pattern" url="assets/marker.patt">
<a-gltf-model src="assets/model.gltf" scale="0.5 0.5 0.5" animation-mixer></a-gltf-model>
<a-text value="Evento Jungle
12 Julio - 18:00h" align="center" position="0 1 0" color="#00FFAA" shader="msdf" font="https://cdn.aframe.io/fonts/mozillavr.fnt"></a-text>
</a-marker>
<a-entity camera></a-entity>
</a-scene>
<div id="footer">Escanea la tarjeta con tu cámara</div>
<script>document.querySelector('a-scene').addEventListener('loaded',()=>{document.getElementById('loading').style.display='none';});</script>
</body>
</html>
